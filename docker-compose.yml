name: tansu

services:
  postgres:
    image: postgres:16-alpine
    container_name: tansu-postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-tansu}
      POSTGRES_USER: ${POSTGRES_USER:-tansu}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-tansu}
    ports:
      - "${POSTGRES_PORT:-5432}:5432"
    volumes:
      - postgres-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-tansu} -d ${POSTGRES_DB:-tansu}"]
      interval: 5s
      timeout: 3s
      retries: 10

  rabbitmq:
    image: rabbitmq:3.13-management-alpine
    container_name: tansu-rabbitmq
    restart: unless-stopped
    environment:
      RABBITMQ_DEFAULT_USER: ${RABBITMQ_DEFAULT_USER:-guest}
      RABBITMQ_DEFAULT_PASS: ${RABBITMQ_DEFAULT_PASS:-guest}
    ports:
      - "${RABBITMQ_PORT:-5672}:5672"
      - "${RABBITMQ_MGMT_PORT:-15672}:15672"
    volumes:
      - rabbitmq-data:/var/lib/rabbitmq
    healthcheck:
      test: ["CMD", "rabbitmq-diagnostics", "-q", "ping"]
      interval: 10s
      timeout: 5s
      retries: 10

  mailhog:
    image: mailhog/mailhog:latest
    container_name: tansu-mailhog
    restart: unless-stopped
    ports:
      - "${SMTP_PORT:-1025}:1025"
      - "${MAILHOG_UI_PORT:-8025}:8025"

  api:
    build:
      context: ./backend
      dockerfile: src/Tansu.Api/Dockerfile
    container_name: tansu-api
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy
      rabbitmq:
        condition: service_healthy
    environment:
      ASPNETCORE_ENVIRONMENT: ${ASPNETCORE_ENVIRONMENT:-Development}
      ASPNETCORE_URLS: http://+:8080
      ConnectionStrings__Postgres: "Host=postgres;Port=5432;Database=${POSTGRES_DB:-tansu};Username=${POSTGRES_USER:-tansu};Password=${POSTGRES_PASSWORD:-tansu}"
      Jwt__Issuer: ${JWT_ISSUER:-tansu-api}
      Jwt__Audience: ${JWT_AUDIENCE:-tansu-clients}
      Jwt__SigningKey: ${JWT_SIGNING_KEY:?Set JWT_SIGNING_KEY in .env}
      Entra__TenantId: ${ENTRA_TENANT_ID}
      Entra__Audience: ${ENTRA_AUDIENCE}
      Branding__BrandName: ${APP_BRAND_NAME:-Tansu}
      Branding__CompanyName: ${APP_COMPANY_NAME:-ТАНСУ}
      Zup__BaseUrl: ${ZUP_BASE_URL:-https://api.tnsu.kz}
      Zup__TenantId: ${ZUP_TENANT_ID:-}
      Zup__ClientId: ${ZUP_CLIENT_ID:-}
      Zup__ClientSecret: ${ZUP_CLIENT_SECRET:-}
      Zup__Audience: ${ZUP_AUDIENCE:-${ENTRA_AUDIENCE}}
      Zup__Scope: ${ZUP_SCOPE:-}
      RabbitMq__Host: rabbitmq
      RabbitMq__User: ${RABBITMQ_DEFAULT_USER:-guest}
      RabbitMq__Password: ${RABBITMQ_DEFAULT_PASS:-guest}
      App__PhotoStoragePath: /var/lib/tansu/photos
      AccessPass__VerifyWebBaseUrl: ${AccessPass__VerifyWebBaseUrl:-https://localhost:${VERIFY_WEB_PORT:-5174}}
      AccessPass__VerifyServiceKey: ${VERIFY_SERVICE_KEY:-dev-verify-service-key-change-me}
      FaceVerify__BaseUrl: ${FACE_VERIFY_BASE_URL:-http://face-verify:8092}
      EmployeePhotoReview__RequireManualApproval: ${EMPLOYEE_PHOTO_REQUIRE_MANUAL:-true}
      EmployeePortal__CredentialsLogPath: ${EMPLOYEE_PORTAL_CREDENTIALS_PATH:-/app/data/employee-portal-credentials.log}
    ports:
      - "${API_PORT:-8080}:8080"
    volumes:
      - photos-data:/var/lib/tansu/photos
      - ./data:/app/data
    healthcheck:
      test: ["CMD", "curl", "-fsS", "http://127.0.0.1:8080/health"]
      interval: 10s
      timeout: 3s
      retries: 12
      start_period: 30s

  worker:
    build:
      context: ./backend
      dockerfile: src/Tansu.Worker/Dockerfile
    container_name: tansu-worker
    restart: unless-stopped
    depends_on:
      rabbitmq:
        condition: service_healthy
      mailhog:
        condition: service_started
    environment:
      DOTNET_ENVIRONMENT: ${ASPNETCORE_ENVIRONMENT:-Development}
      RabbitMq__Host: rabbitmq
      RabbitMq__User: ${RABBITMQ_DEFAULT_USER:-guest}
      RabbitMq__Password: ${RABBITMQ_DEFAULT_PASS:-guest}
      Smtp__Host: ${SMTP_HOST:-mailhog}
      Smtp__Port: ${SMTP_PORT:-1025}
      Smtp__From: ${SMTP_FROM:-no-reply@tansu.local}
      Smtp__User: ${SMTP_USER:-}
      Smtp__Password: ${SMTP_PASSWORD:-}
      App__WebBaseUrl: http://localhost:${WEB_PORT:-5173}
      Branding__BrandName: ${APP_BRAND_NAME:-Tansu}
      Branding__CompanyName: ${APP_COMPANY_NAME:-ТАНСУ}

  web:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: tansu-web
    restart: unless-stopped
    depends_on:
      api:
        condition: service_healthy
    environment:
      VITE_API_BASE_URL: ${VITE_API_BASE_URL:-http://localhost:8080}
      VITE_APP_BRAND_NAME: ${APP_BRAND_NAME:-Tansu}
      VITE_APP_COMPANY_NAME: ${APP_COMPANY_NAME:-ТАНСУ}
    ports:
      - "${WEB_PORT:-5173}:5173"
    volumes:
      - ./frontend:/app
      - /app/node_modules
    command: npm run dev -- --host 0.0.0.0

  verify-api:
    build:
      context: ./backend
      dockerfile: src/Tansu.Verify.Api/Dockerfile
    container_name: tansu-verify-api
    restart: unless-stopped
    depends_on:
      api:
        condition: service_healthy
      face-verify:
        condition: service_healthy
    environment:
      ASPNETCORE_ENVIRONMENT: ${ASPNETCORE_ENVIRONMENT:-Development}
      ASPNETCORE_URLS: http://+:8090
      TansuApi__BaseUrl: http://api:8080
      TansuApi__VerifyServiceKey: ${VERIFY_SERVICE_KEY:-dev-verify-service-key-change-me}
      FaceVerify__BaseUrl: ${FACE_VERIFY_BASE_URL:-http://face-verify:8092}
      FaceVerify__TimeoutSeconds: ${FACE_VERIFY_TIMEOUT_SECONDS:-120}
    ports:
      - "${VERIFY_API_PORT:-8091}:8090"
    healthcheck:
      test: ["CMD", "curl", "-fsS", "http://127.0.0.1:8090/health"]
      interval: 10s
      timeout: 3s
      retries: 8
      start_period: 15s

  face-verify:
    build:
      context: ./face-verify
      dockerfile: Dockerfile
    container_name: tansu-face-verify
    restart: unless-stopped
    environment:
      FACE_VERIFY_MODEL: ${FACE_VERIFY_MODEL:-Facenet}
      FACE_VERIFY_DETECTOR: ${FACE_VERIFY_DETECTOR:-opencv}
      FACE_VERIFY_MAX_SIDE: ${FACE_VERIFY_MAX_SIDE:-1024}
      DEEPFACE_HOME: /models
    deploy:
      resources:
        limits:
          memory: 2G
    ports:
      - "${FACE_VERIFY_PORT:-8092}:8092"
    healthcheck:
      test: ["CMD", "curl", "-fsS", "http://127.0.0.1:8092/health"]
      interval: 15s
      timeout: 5s
      retries: 10
      start_period: 120s

  verify-web:
    build:
      context: ./verify-web
      dockerfile: Dockerfile
    container_name: tansu-verify-web
    restart: unless-stopped
    depends_on:
      verify-api:
        condition: service_healthy
    environment:
      VITE_VERIFY_API_BASE_URL: ${VITE_VERIFY_API_BASE_URL:-}
      VITE_VERIFY_API_PROXY_TARGET: http://verify-api:8090
      VITE_APP_BRAND_NAME: ${APP_BRAND_NAME:-Tansu}
    ports:
      - "${VERIFY_WEB_PORT:-5174}:5174"
    volumes:
      - ./verify-web:/app
      - /app/node_modules
    command: npm run dev -- --host 0.0.0.0

  employee-portal-web:
    build:
      context: ./employee-portal-web
      dockerfile: Dockerfile
    container_name: tansu-employee-portal-web
    restart: unless-stopped
    depends_on:
      api:
        condition: service_healthy
    environment:
      VITE_API_BASE_URL: ${VITE_API_BASE_URL:-http://localhost:8080}
      VITE_APP_BRAND_NAME: ${APP_BRAND_NAME:-Tansu}
      VITE_APP_COMPANY_NAME: ${APP_COMPANY_NAME:-ТАНСУ}
    ports:
      - "${EMPLOYEE_PORTAL_WEB_PORT:-5175}:5175"
    volumes:
      - ./employee-portal-web:/app
      - /app/node_modules
    command: npm run dev -- --host 0.0.0.0 --port 5175

volumes:
  postgres-data:
  rabbitmq-data:
  photos-data:

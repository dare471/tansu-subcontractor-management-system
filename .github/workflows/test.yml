name: Tests

on:
  push:
    branches: [main, develop, fix]
  pull_request:

jobs:
  backend:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '10.0.x'

      - name: Restore
        run: dotnet restore backend/Tansu.sln

      - name: Unit tests
        run: dotnet test backend/tests/Tansu.UnitTests/Tansu.UnitTests.csproj --no-restore --verbosity minimal

      - name: Integration tests
        run: dotnet test backend/tests/Tansu.IntegrationTests/Tansu.IntegrationTests.csproj --no-restore --verbosity minimal --blame-hang-timeout 2m
        env:
          TZ: UTC
          RabbitMq__Host: ""
          FaceVerify__BaseUrl: ""
          Zup__BaseUrl: ""
          Zup__TenantId: ""
          Zup__ClientId: ""
          Zup__ClientSecret: ""
          EmployeePortal__CredentialsLogPath: ""

  frontend:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: frontend
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - run: npm ci
      - run: npm test
